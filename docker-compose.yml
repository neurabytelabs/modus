services:
  modus-app:
    build:
      context: ./src
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ./src:/app
      - deps:/app/deps
      - build:/app/_build
      - ./data/db:/app/priv/data
    environment:
      - MIX_ENV=dev
      - PHX_HOST=localhost
      - PHX_PORT=4000
      - DATABASE_PATH=/app/priv/data/modus.db
      - OLLAMA_URL=http://modus-llm:11434
      - OLLAMA_MODEL=llama3.2:3b-instruct-q4_K_M
    depends_on:
      modus-llm:
        condition: service_healthy
    command: >
      sh -c "mix deps.get && mix ecto.create && mix ecto.migrate && mix phx.server"

  modus-llm:
    image: ollama/ollama:latest
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  deps:
  build:
