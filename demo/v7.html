<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODUS · Sunrise Valley · Cartographer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--parch:#f4e8c1;--dark:#2a1f14;--brown:#5c3d2e;--warm:#8b6914;--gold:#c9a84c;--glass:rgba(42,31,20,0.85);--glass2:rgba(42,31,20,0.7);--accent:#d4a843;--red:#c0392b;--green:#27ae60;--blue:#4a90d9;--forest:#2d5a27;--mountain:#8a8a7a;--water:#4a7fb5;--meadow:#7ab648;--sand:#d4c088;--farm:#c9b458;--path:#a08060;--text:#f0e6d0;--textsub:#b8a88a}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#1a1408;color:var(--text)}
#map-container{width:100%;height:100%;position:relative;overflow:hidden}
#map{position:absolute;transform-origin:0 0}
.tile{position:absolute;border:1px solid rgba(0,0,0,0.08)}
.tile::after{content:'';position:absolute;inset:0;background:repeating-conic-gradient(rgba(0,0,0,.03) 0% 25%,transparent 0% 50%) 0 0/4px 4px;pointer-events:none}
.agent-marker{position:absolute;cursor:pointer;z-index:10;text-align:center;transform:translate(-50%,-50%);transition:transform .15s}
.agent-marker:hover{transform:translate(-50%,-50%) scale(1.2)}
.agent-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,0,0,0.4);margin:0 auto;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
.agent-label{font-family:'Playfair Display',serif;font-size:10px;color:var(--text);text-shadow:0 1px 3px rgba(0,0,0,0.8);white-space:nowrap;margin-top:2px}
.animal-dot{position:absolute;width:7px;height:7px;border-radius:50%;transform:translate(-50%,-50%);z-index:5;opacity:.8;cursor:pointer}
.building-marker{position:absolute;cursor:pointer;z-index:8;transform:translate(-50%,-50%)}
.building-rect{width:18px;height:18px;border:2px solid rgba(0,0,0,0.3);box-shadow:2px 2px 6px rgba(0,0,0,0.4)}
.building-label{font-family:'Playfair Display',serif;font-size:8px;color:var(--textsub);text-shadow:0 1px 2px rgba(0,0,0,0.8);white-space:nowrap;text-align:center;margin-top:1px}
/* Floating UI */
.float{position:absolute;z-index:100}
.frost{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(201,168,76,0.2);border-radius:10px;color:var(--text)}
#search{top:16px;left:16px;display:flex;align-items:center;padding:10px 16px;gap:8px;font-size:14px;width:280px;border-radius:24px}
#search input{background:none;border:none;color:var(--text);outline:none;flex:1;font-family:'Inter',sans-serif;font-size:13px}
#search input::placeholder{color:var(--textsub)}
#layers{top:16px;right:56px;display:flex;gap:6px}
.layer-pill{padding:5px 12px;font-size:11px;font-weight:500;border-radius:16px;cursor:pointer;user-select:none;transition:.2s}
.layer-pill.active{background:var(--accent);color:var(--dark);border-color:var(--accent)}
.layer-pill:not(.active){opacity:.7}
.layer-pill:hover{opacity:1}
#settings-btn{position:absolute;top:16px;right:16px;z-index:100;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
#settings-panel{position:absolute;top:56px;right:16px;z-index:110;width:240px;padding:16px;display:none;font-size:12px}
#settings-panel label{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
#settings-panel select,#settings-panel input[type=range]{background:var(--dark);color:var(--text);border:1px solid var(--brown);border-radius:4px;padding:2px 4px}
#timeline{top:56px;left:50%;transform:translateX(-50%);display:flex;height:20px;border-radius:10px;overflow:hidden;font-size:9px}
.era-block{padding:2px 10px;line-height:18px;white-space:nowrap;cursor:pointer;opacity:.8;transition:.15s}
.era-block:hover,.era-block.active{opacity:1}
#compass{bottom:80px;left:16px;width:60px;height:60px}
#scale-bar{bottom:60px;left:16px;font-size:9px;color:var(--textsub);padding:4px 8px}
#speed{bottom:150px;left:16px;display:flex;gap:4px}
.speed-btn{padding:4px 10px;font-size:11px;border-radius:12px;cursor:pointer}
.speed-btn.active{background:var(--accent);color:var(--dark)}
#zoom{bottom:80px;right:16px;display:flex;flex-direction:column;gap:4px}
.zoom-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:700}
#minimap-toggle{bottom:50px;right:16px;padding:4px 10px;font-size:10px;border-radius:8px;cursor:pointer}
#minimap{bottom:80px;right:56px;width:120px;height:86px;border-radius:8px;display:none;overflow:hidden}
#minimap canvas{width:100%;height:100%}
#attribution{bottom:12px;left:50%;transform:translateX(-50%);font-family:'Playfair Display',serif;font-size:12px;letter-spacing:1px;padding:6px 20px;border-radius:16px;white-space:nowrap}
/* Info card */
.info-card{position:absolute;z-index:200;width:260px;border-radius:12px;padding:14px;font-size:12px;animation:fadeIn .2s}
.info-card::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:var(--glass)}
.info-card.above::after{bottom:-8px;border-top-color:var(--glass);border-bottom:none}
.info-card .close-btn{position:absolute;top:6px;right:10px;cursor:pointer;font-size:14px;opacity:.6}
.info-card .close-btn:hover{opacity:1}
.info-card h3{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:4px}
.info-card .mood{font-size:11px;color:var(--textsub)}
.energy-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin:6px 0;overflow:hidden}
.energy-fill{height:100%;border-radius:3px;transition:width .3s}
.info-card .action{font-size:11px;font-style:italic;color:var(--gold);margin:4px 0}
.info-card .btns{display:flex;gap:6px;margin-top:8px}
.info-card .btns button{flex:1;padding:5px 8px;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-detail{background:var(--accent);color:var(--dark)}
.btn-chat{background:rgba(255,255,255,.1);color:var(--text)}
.detail-section{margin-top:10px;border-top:1px solid rgba(255,255,255,.1);padding-top:8px;font-size:11px;display:none}
.detail-section.show{display:block}
.detail-section p{margin:3px 0}
.chat-input{display:none;margin-top:8px}
.chat-input input{width:100%;padding:6px 10px;border:1px solid var(--brown);border-radius:6px;background:rgba(0,0,0,.3);color:var(--text);font-size:11px;outline:none}
/* Toasts */
#toasts{position:absolute;top:90px;right:16px;z-index:150;display:flex;flex-direction:column;gap:6px;max-width:280px}
.toast{padding:10px 14px;border-radius:8px;font-size:11px;animation:slideIn .3s;opacity:.95}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:.95}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* Build mode */
#build-bar{position:absolute;bottom:0;left:0;right:0;z-index:120;padding:12px 20px;display:none;align-items:center;gap:10px;border-radius:12px 12px 0 0}
#build-bar .tool{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,0.2)}
#build-bar .tool:hover,#build-bar .tool.active{background:var(--accent);color:var(--dark)}
/* Corner ornaments */
.ornament{position:absolute;z-index:90;width:40px;height:40px;pointer-events:none}
.ornament svg{width:100%;height:100%}
.orn-tl{top:4px;left:4px}.orn-tr{top:4px;right:4px;transform:scaleX(-1)}.orn-bl{bottom:4px;left:4px;transform:scaleY(-1)}.orn-br{bottom:4px;right:4px;transform:scale(-1)}
/* Extra buttons */
#extra-btns{position:absolute;bottom:16px;left:90px;z-index:100;display:flex;gap:6px}
#extra-btns button{padding:5px 10px;font-size:10px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;background:var(--glass2);color:var(--text);border:1px solid rgba(201,168,76,0.2)}
#god-indicator{position:absolute;top:90px;left:16px;z-index:100;font-size:10px;padding:4px 10px;border-radius:8px;display:none;background:rgba(192,57,43,.3);border:1px solid rgba(192,57,43,.5)}
</style>
</head>

<text x="30" y="4" text-anchor="middle" fill="var(--accent)" font-family="Playfair Display" font-size="7" font-weight="700">N</text>
</svg>
</div>
<div id="scale-bar" class="float">━━━━ 100m</div>
<!-- Zoom -->
<div id="zoom" class="float">
<div class="zoom-btn frost" onclick="zoomMap(1)">+</div>
<div class="zoom-btn frost" onclick="zoomMap(-1)">−</div>
</div>
<div id="minimap-toggle" class="float frost" onclick="toggleMinimap()">🗺️</div>
<div id="minimap" class="float frost"><canvas id="minimap-canvas" width="120" height="86"></canvas></div>
<!-- Attribution -->

<!-- Toasts -->
<div id="toasts"></div>
<!-- Build bar -->

<span style="font-size:12px;font-weight:600;margin-right:8px">Build</span>
<div class="tool" title="Grass">🌿</div><div class="tool" title="Forest">🌲</div><div class="tool" title="Water">💧</div><div class="tool" title="Mountain">⛰️</div><div class="tool" title="Path">🛤️</div><div class="tool" title="Farm">🌾</div><div class="tool" title="House">🏠</div><div class="tool" title="Market">🏪</div><div class="tool" title="Well">🪣</div><div class="tool" title="Tower">🗼</div>

// Build terrain tiles
function buildMap(){

for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
const ch=(TERRAIN[r]&&TERRAIN[r][c])||'G';
const t=document.createElement('div');t.className='tile';
const base=TCOLORS[ch]||TCOLORS.G;
const v=Math.random()*10-5;
t.style.cssText=`left:${c*TILE}px;top:${r*TILE}px;width:${TILE}px;height:${TILE}px;background:${base};filter:brightness(${1+v/100})`;
t.dataset.terrain=ch;t.dataset.col=c;t.dataset.row=r;
t.addEventListener('click',e=>{e.stopPropagation();showTerrainCard(c,r,ch,e)});
map.appendChild(t);
}}

function placeAgents(){
document.querySelectorAll('.agent-marker').forEach(e=>e.remove());
if(!layers.Agents)return;
agents.forEach((a,i)=>{
const m=document.createElement('div');m.className='agent-marker';
m.style.left=a.gx*TILE+TILE/2+'px';m.style.top=a.gy*TILE+TILE/2+'px';
m.innerHTML=`<div class="agent-dot" style="background:${a.color}"></div><div class="agent-label">${a.name}</div>`;
m.addEventListener('click',e=>{e.stopPropagation();showAgentCard(a,m)});
map.appendChild(m);
});}

function placeAnimals(){
document.querySelectorAll('.animal-dot').forEach(e=>e.remove());
if(!layers.Wildlife)return;
animals.forEach(a=>{
const d=document.createElement('div');d.className='animal-dot';
d.style.left=a.x*TILE+TILE/2+'px';d.style.top=a.y*TILE+TILE/2+'px';
d.style.background=a.color;d.title=a.type;
map.appendChild(d);
});}

function placeBuildings(){
document.querySelectorAll('.building-marker').forEach(e=>e.remove());
if(!layers.Buildings)return;
buildings.forEach(b=>{
const m=document.createElement('div');m.className='building-marker';
m.style.left=b.gx*TILE+TILE/2+'px';m.style.top=b.gy*TILE+TILE/2+'px';
m.innerHTML=`<div class="building-rect" style="background:${b.color}"></div><div class="building-label">${b.name}</div>`;
m.addEventListener('click',e=>{e.stopPropagation();showBuildingCard(b,m)});
map.appendChild(m);
});}

function closeCard(){if(activeCard){activeCard.remove();activeCard=null;}}

function showAgentCard(a,marker){
closeCard();
const card=document.createElement('div');card.className='info-card frost above';
const px=parseFloat(marker.style.left),py=parseFloat(marker.style.top);
card.style.left=(px-130)+'px';card.style.top=(py-200)+'px';
const eColor=a.energy>60?'var(--green)':a.energy>30?'var(--gold)':'var(--red)';
card.innerHTML=`<span class="close-btn" onclick="closeCard()">✕</span>
<h3>${a.name}</h3><span class="mood">${a.occ} · ${a.mood}</span>
<div class="energy-bar"><div class="energy-fill" style="width:${a.energy}%;background:${eColor}"></div></div>
<div class="action">📍 ${a.action}</div>
<div class="btns"><button class="btn-detail" onclick="this.parentElement.parentElement.querySelector('.detail-section').classList.toggle('show')">View Details</button><button class="btn-chat" onclick="this.parentElement.parentElement.querySelector('.chat-input').style.display='block'">💬 Chat</button></div>
<div class="detail-section">${a.personality?`<p><b>Personality:</b> ${a.personality}</p>`:''}<p><b>Inventory:</b> ${a.inv||'—'}</p><p><b>Goals:</b> ${a.goals||'—'}</p><p><b>Relations:</b> ${a.rels||'—'}</p>${a.phrase?`<p><b>Catchphrase:</b> ${a.phrase}</p>`:''}</div>
<div class="chat-input"><input type="text" placeholder="Say something to ${a.name}..." onkeydown="if(event.key==='Enter'){addToast('💬 You → ${a.name}: '+this.value);this.value=''}"></div>`;
map.appendChild(card);activeCard=card;
}

function showBuildingCard(b,marker){
closeCard();
const card=document.createElement('div');card.className='info-card frost above';
const px=parseFloat(marker.style.left),py=parseFloat(marker.style.top);
card.style.left=(px-130)+'px';card.style.top=(py-160)+'px';
card.innerHTML=`<span class="close-btn" onclick="closeCard()">✕</span>
<h3>${b.name}</h3><span class="mood">${b.type}</span>
<div class="action" style="margin-top:8px">📍 Grid ${b.gx},${b.gy}</div>`;
map.appendChild(card);activeCard=card;
}

function showTerrainCard(c,r,ch,evt){
closeCard();
const card=document.createElement('div');card.className='info-card frost above';
card.style.left=(c*TILE+TILE/2-130)+'px';card.style.top=(r*TILE-100)+'px';
card.innerHTML=`<span class="close-btn" onclick="closeCard()">✕</span>
<h3>${TNAMES[ch]||'Unknown'}</h3><div class="action">Resources: ${TRESOURCES[ch]||'—'}</div>
<div class="mood">Tile ${c},${r}</div>`;
map.appendChild(card);activeCard=card;
}

// Layers
function buildLayers(){
const el=document.getElementById('layers');el.innerHTML='';
Object.keys(layers).forEach(k=>{
const p=document.createElement('div');p.className='layer-pill frost'+(layers[k]?' active':'');
p.textContent=k;p.onclick=()=>{layers[k]=!layers[k];buildLayers();refresh();};
el.appendChild(p);
});}

// Timeline
function buildTimeline(){
const el=document.getElementById('timeline');
eras.forEach(e=>{
const b=document.createElement('div');b.className='era-block'+(e.active?' active':'');
b.style.background=e.color;b.textContent=e.name;b.title='Day '+e.d;
el.appendChild(b);
});}

// Speed
function buildSpeed(){
const el=document.getElementById('speed');
['⏸','1×','5×','10×'].forEach((s,i)=>{
const b=document.createElement('div');b.className='speed-btn frost'+(i===1?' active':'');
b.textContent=s;b.onclick=()=>{el.querySelectorAll('.speed-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};
el.appendChild(b);
});}

// Toasts
function addToast(msg){
const t=document.createElement('div');t.className='toast frost';t.textContent=msg;
document.getElementById('toasts').appendChild(t);
setTimeout(()=>t.remove(),5000);
}

// Zoom & pan
function zoomMap(dir){
scale=Math.max(0.5,Math.min(3,scale+dir*0.25));
updateTransform();
}
function updateTransform(){map.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;}
let dragging=false,dx,dy;
mapC.addEventListener('mousedown',e=>{dragging=true;dx=e.clientX-panX;dy=e.clientY-panY;});
window.addEventListener('mousemove',e=>{if(dragging){panX=e.clientX-dx;panY=e.clientY-dy;updateTransform();}});
window.addEventListener('mouseup',()=>dragging=false);
mapC.addEventListener('wheel',e=>{e.preventDefault();zoomMap(e.deltaY<0?1:-1);},{passive:false});

function toggleSettings(){const p=document.getElementById('settings-panel');p.style.display=p.style.display==='block'?'none':'block';}
function toggleMinimap(){const m=document.getElementById('minimap');m.style.display=m.style.display==='block'?'none':'block';drawMinimap();}
function toggleBuild(){buildMode=!buildMode;document.getElementById('build-bar').style.display=buildMode?'flex':'none';}
function toggleGod(){godMode=!godMode;document.getElementById('god-indicator').style.display=godMode?'block':'none';addToast(godMode?'⚡ God Mode ON':'God Mode OFF');}

function drawMinimap(){
const c=document.getElementById('minimap-canvas'),ctx=c.getContext('2d');
const sw=c.width/COLS,sh=c.height/ROWS;
for(let r=0;r<ROWS;r++)for(let col=0;col<COLS;col++){
const ch=(TERRAIN[r]&&TERRAIN[r][col])||'G';
ctx.fillStyle=TCOLORS[ch]||TCOLORS.G;ctx.fillRect(col*sw,r*sh,sw+.5,sh+.5);
}
agents.forEach(a=>{ctx.fillStyle=a.color;ctx.beginPath();ctx.arc(a.gx*sw+sw/2,a.gy*sh+sh/2,2,0,Math.PI*2);ctx.fill();});
}

function refresh(){placeAgents();placeAnimals();placeBuildings();}

// Search
document.querySelector('#search input').addEventListener('input',function(){
const q=this.value.toLowerCase();
if(!q){refresh();return;}
agents.forEach(a=>{
const el=[...map.querySelectorAll('.agent-marker')].find(m=>m.querySelector('.agent-label').textContent===a.name);
if(el)el.style.opacity=a.name.toLowerCase().includes(q)||a.occ.toLowerCase().includes(q)?'1':'0.2';
});
});

// Keyboard shortcuts
window.addEventListener('keydown',e=>{
if(e.target.tagName==='INPUT')return;
if(e.key==='g')toggleGod();
if(e.key==='b')toggleBuild();
if(e.key==='m')toggleMinimap();
if(e.key==='1')document.querySelectorAll('.speed-btn')[1]?.click();
if(e.key==='2')document.querySelectorAll('.speed-btn')[2]?.click();
if(e.key==='3')document.querySelectorAll('.speed-btn')[3]?.click();
if(e.key==='0')document.querySelectorAll('.speed-btn')[0]?.click();
if(e.key==='Escape')closeCard();
});

// Init
buildMap();buildLayers();buildTimeline();buildSpeed();refresh();

// Center map
panX=(window.innerWidth-COLS*TILE)/2;panY=(window.innerHeight-ROWS*TILE)/2;
updateTransform();

// Show initial toasts
setTimeout(()=>addToast('Rio hunted a deer in the northern forest'),500);
setTimeout(()=>addToast('Kai finished building a stone house! 🏠'),2000);
setTimeout(()=>addToast('🌸 Spring has arrived in Sunrise Valley'),4000);

// Build tool selection
document.querySelectorAll('#build-bar .tool').forEach(t=>{
t.addEventListener('click',()=>{document.querySelectorAll('#build-bar .tool').forEach(x=>x.classList.remove('active'));t.classList.add('active');});
});
</script>
</body>
</html>
